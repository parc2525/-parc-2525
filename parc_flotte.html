function EditCell({value,onSave,isSelect,opts,style={}}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value||"");
  const ref=useRef();
  useEffect(()=>{setVal(value||"");},[value]);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  if(!editing) return(
    <div onClick={e=>{e.stopPropagation();setEditing(true);}} style={{cursor:"pointer",minHeight:16,...style}}>
      {value||<span style={{color:"#d1d5db",fontStyle:"italic",fontSize:9}}>—</span>}
    </div>
  );
  if(isSelect) return(
    <select ref={ref} value={val} autoFocus onChange={e=>setVal(e.target.value)}
      onBlur={()=>{onSave(val);setEditing(false);}}
      style={{width:"100%",fontSize:10,border:"1.5px solid #3b82f6",borderRadius:4,outline:"none",fontFamily:"inherit",background:"#fff"}}>
      {(opts||[]).map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );
  return(
    <input ref={ref} value={val} onChange={e=>setVal(e.target.value)}
      onBlur={()=>{onSave(val);setEditing(false);}}
      onKeyDown={e=>{if(e.key==="Enter"){onSave(val);setEditing(false);}if(e.key==="Escape")setEditing(false);}}
      style={{width:"100%",fontSize:10,border:"1.5px solid #3b82f6",borderRadius:4,padding:"1px 4px",background:"#fffbeb",outline:"none",fontFamily:"inherit"}}/>
  );
}

function Login({onLogin}){

                <div style={{display:"flex",gap:6}}>
                  <button onClick={cancelExpand} style={{flex:1,padding:"10px",borderRadius:8,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,fontSize:12,cursor:"pointer"}}>Annuler</button>
                  <button onClick={()=>validExpand(pr,tab==="depart"?"depart":"retour")}

        <div style={{fontSize:11,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1,marginTop:10}}>
          Confirmations récentes
        </div>
        {(()=>{
          const recents=[];
          Object.entries(prets).forEach(([vid,vp])=>{
            (vp||[]).forEach(pr=>{
              if(tab==="depart"&&pr.departConfirme&&pr.debut<=tISO){
                const v=vhl.find(x=>x.id===vid);
                recents.push({...pr,vid,modele:v?v.modele:""});
              }
              if(tab==="retour"&&pr.retourConfirme&&pr.fin<=tISO){
                const v=vhl.find(x=>x.id===vid);
                recents.push({...pr,vid,modele:v?v.modele:""});
              }
            });
          });
          recents.sort((a,b)=>(tab==="depart"?b.debut.localeCompare(a.debut):b.fin.localeCompare(a.fin)));
          const top5=recents.slice(0,5);
          if(top5.length===0) return <div style={{fontSize:12,color:"#d1d5db",textAlign:"center",padding:10}}>Aucune confirmation récente</div>;

                    ?`Parti à ${pr.heureDepart||"—"} · ${pr.kmDepart?pr.kmDepart+" km":"km ?"} · ${pr.siteDepart||"site ?"}`
                    :`Rentré à ${pr.heureRetour||"—"} · ${pr.kmRetour?pr.kmRetour+" km":"km ?"} · ${pr.siteRetour||"site ?"}`}

              </div>
              <button onClick={()=>onConfirm(pr.vid,pr.id,tab==="depart"?"annuler_depart":"annuler_retour")}

                ↩️ Annuler
              </button>
            </div>
          ));
        })()}
      </div>
    </div>
  );
}

function App(){
  const today=new Date();
  const tISO=toISO(today);
  const [role,setRole]=useState(null); // null=login, "manager", "gaetan"
  const [vhl,setVhl]=useState(INIT);
  const [prets,setPrets]=useState({});
  const [hidden,setHidden]=useState({});
  const [vy,setVy]=useState(today.getFullYear());
  const [vm,setVm]=useState(today.getMonth());
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({debut:"",fin:"",personne:"",heureDepart:"",heureRetour:"",kmDepart:"",kmRetour:"",siteDepart:"",siteRetour:""});
  const [addOpen,setAddOpen]=useState(false);
  const [nim,setNim]=useState(""); const [nmo,setNmo]=useState("");
  const [saved,setSaved]=useState(false);
  const [parcActif,setParcActif]=useState("2525");
  const [archived,setArchived]=useState([]);
  const [showArchive,setShowArchive]=useState(false);
  const [showMouvements,setShowMouvements]=useState(false);
  const [moveMenuFor,setMoveMenuFor]=useState(null);
  const [compactMode,setCompactMode]=useState(false);
  const calWrapRef=useRef(null);
  const [colW,setColW]=useState(COL);
  const [importResult,setImportResult]=useState(null);
  const [srch,setSrch]=useState("");
  const [fParc,setFParc]=useState("TOUS");
  const [fEvent,setFEvent]=useState("");
  const [fModele,setFModele]=useState("TOUS");
  const [fFin,setFFin]=useState("TOUS");
  const [fCouleur,setFCouleur]=useState("TOUS");

  useEffect(()=>{
    function applyData(p){
      const pretsParsed = typeof p.prets==="string"?JSON.parse(p.prets):p.prets;
      const hiddenParsed = typeof p.hidden==="string"?JSON.parse(p.hidden):p.hidden;
      const vhlParsed = typeof p.vhl==="string"?JSON.parse(p.vhl):p.vhl;
      let archivedParsed = typeof p.archived==="string"?JSON.parse(p.archived):(p.archived||[]);
      // Nettoyage : supprime les doublons éventuels (bug corrigé, nettoie les anciennes données)
      if(archivedParsed&&archivedParsed.length){
        const seen=new Set();
        archivedParsed = archivedParsed.filter(a=>{ if(seen.has(a.id)) return false; seen.add(a.id); return true; });
      }
      if(pretsParsed) setPrets(pretsParsed);
      if(hiddenParsed) setHidden(hiddenParsed);
      setArchived(archivedParsed);
      if(vhlParsed){
        const archivedIds = new Set(archivedParsed.map(a=>a.id));
        const saved={}; vhlParsed.forEach(v=>{ saved[v.id]=v; });
        // IMPORTANT : on exclut les véhicules archivés de la reconstruction depuis INIT,
        // sinon ils réapparaissent à chaque synchronisation.
        const merged = INIT.filter(v=>!archivedIds.has(v.id)).map(v=> saved[v.id] ? {...v,...saved[v.id]} : v);
        const initIds=new Set(INIT.map(v=>v.id));
        const extras=vhlParsed.filter(v=>!initIds.has(v.id)&&!archivedIds.has(v.id));
        setVhl([...merged,...extras]);
      }
    }
    // Écoute Firebase en temps réel
    try{
      db.ref("parc2525").on("value", snap=>{
        const data=snap.val();
        if(data) applyData(data);
        else {
          // Fallback localStorage si Firebase vide
          try{
            const d=localStorage.getItem(SK);
            if(d) applyData(JSON.parse(d));
          }catch(_){}
        }
      });
    }catch(_){
      // Fallback localStorage si Firebase indisponible
      try{
        const d=localStorage.getItem(SK);
        if(d) applyData(JSON.parse(d));
      }catch(_){}
    }
  },[]);

  function confirmAction(vid, pid, type, extra){
    setPrets(prevPrets=>{
      const vp = prevPrets[vid]||[];
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
      const up = vp.map(p=>{
        if(p.id!==pid) return p;
        if(type==="depart") return {...p, departConfirme:true, departAt:now.toLocaleString("fr-FR"),
          debut:(extra&&extra.date)||p.debut,
          heureDepart:(extra&&extra.heure)||hh, kmDepart:(extra&&extra.km)||p.kmDepart||"", siteDepart:(extra&&extra.site)||p.siteDepart||"",
          commentaireDepart:(extra&&extra.commentaire)||p.commentaireDepart||""};
        if(type==="retour") return {...p, retourConfirme:true, retourAt:now.toLocaleString("fr-FR"),
          fin:(extra&&extra.date)||p.fin,
          heureRetour:(extra&&extra.heure)||hh, kmRetour:(extra&&extra.km)||p.kmRetour||"", siteRetour:(extra&&extra.site)||p.siteRetour||"",
          commentaireRetour:(extra&&extra.commentaire)||p.commentaireRetour||""};
        if(type==="annuler_depart") return {...p, departConfirme:false, departAt:null};
        if(type==="annuler_retour") return {...p, retourConfirme:false, retourAt:null};
        return p;
      });
      const newPrets = {...prevPrets,[vid]:up};
      // Persister immédiatement
      try{localStorage.setItem(SK,JSON.stringify({vhl,prets:newPrets,hidden}));}catch(_){}
      try{db.ref("parc2525").set({vhl:JSON.stringify(vhl),prets:JSON.stringify(newPrets),hidden:JSON.stringify(hidden),updatedAt:Date.now()});}catch(_){}
      return newPrets;
    });
  }

  function persist(v,p,h,a){
    const ar = a||archived;
    try{localStorage.setItem(SK,JSON.stringify({vhl:v,prets:p,hidden:h,archived:ar}));}catch(_){}
    try{
      db.ref("parc2525").set({
        vhl: JSON.stringify(v),
        prets: JSON.stringify(p),
        hidden: JSON.stringify(h),
        archived: JSON.stringify(ar),
        updatedAt: Date.now()
      });
    }catch(_){}
    setSaved(true);setTimeout(()=>setSaved(false),1500);
  }
  function save(v,p,h,a){setVhl(v);setPrets(p);setHidden(h);if(a!==undefined)setArchived(a);persist(v,p,h,a);}

  function archiveVhl(id){
    setVhl(prevVhl=>{
      const v = prevVhl.find(x=>x.id===id);
      if(!v) return prevVhl; // déjà archivé ou véhicule introuvable : ne rien faire
      const newVhl = prevVhl.filter(x=>x.id!==id);
      setArchived(prevArchived=>{
        if(prevArchived.some(a=>a.id===id)) return prevArchived; // évite les doublons
        const newArchived = [...prevArchived, {...v, archivedAt: new Date().toLocaleDateString("fr-FR")}];
        persist(newVhl, prets, hidden, newArchived);
        return newArchived;
      });
      return newVhl;
    });
  }

  function importExcel(file){
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const existingIds = new Set(vhl.map(v=>v.id.toUpperCase()));
        let added=0, skipped=0;
        const newVehicles = [];
        rows.forEach(row=>{
          // Colonnes possibles selon le format actuel
          const id = (row['IMMATRICULATION']||row['Immatriculation']||row['immat']||row['IMMAT']||'').toString().trim().toUpperCase();
          if(!id) return;
          if(existingIds.has(id)){skipped++;return;}
          newVehicles.push({
            id,
            modele: (row['MODÈLE']||row['Modele']||row['modele']||row['MODELE']||'').toString().trim(),
            moteur: (row['MOTORISATION']||row['Motorisation']||row['moteur']||row['MOTEUR']||'').toString().trim(),
            fin:    (row['FINITION']||row['Finition']||row['fin']||'').toString().trim(),
            couleur:(row['COULEUR']||row['Couleur']||row['couleur']||'').toString().trim(),
            event:  (row['EVENT']||row['Event']||row['event']||'2A').toString().trim(),
            parc:   (row['PARC']||row['Parc']||row['parc']||parcActif).toString().trim(),
            vin:    (row['VIN']||row['Vin']||row['vin']||row['VIN / CHÂSSIS']||'').toString().trim(),
          });
          added++;
        });
        if(newVehicles.length>0) save([...vhl,...newVehicles],prets,hidden);
        setImportResult({added,skipped,total:rows.length});
        setTimeout(()=>setImportResult(null),4000);
      }catch(err){
        setImportResult({error:"Erreur de lecture : "+err.message});
        setTimeout(()=>setImportResult(null),4000);
      }
    };
    reader.readAsArrayBuffer(file);
  }
  function upField(id,field,val){save(vhl.map(v=>v.id===id?{...v,[field]:val}:v),prets,hidden);}

  const days=useMemo(()=>Array.from({length:daysIn(vy,vm)},(_,i)=>new Date(vy,vm,i+1)),[vy,vm]);
  const tCol=today.getFullYear()===vy&&today.getMonth()===vm?today.getDate()-1:null;

  useEffect(()=>{
    function recalc(){
      const el=calWrapRef.current;
      if(!el||days.length===0)return;
      const fixedW=compactMode?CW.immat:FIXED;
      const avail=el.clientWidth-fixedW;
      const w=Math.max(COL, Math.floor(avail/days.length));
      setColW(w);
    }
    recalc();
    window.addEventListener("resize",recalc);
    return ()=>window.removeEventListener("resize",recalc);
  },[days.length,compactMode]);

  function prevM(){if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1);}
  function nextM(){if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1);}

  function openNew(vid){setForm({debut:tISO,fin:tISO,personne:"",heureDepart:"",heureRetour:"",kmDepart:"",kmRetour:"",siteDepart:"",siteRetour:""});setModal({vid,mode:"new"});}
  function openEdit(vid,pr,e){e.stopPropagation();setForm({debut:pr.debut,fin:pr.fin,personne:pr.personne,heureDepart:pr.heureDepart||"",heureRetour:pr.heureRetour||"",kmDepart:pr.kmDepart||"",kmRetour:pr.kmRetour||"",siteDepart:pr.siteDepart||"",siteRetour:pr.siteRetour||""});setModal({vid,mode:"edit",pid:pr.id});}

  function savePret(){
    if(!form.debut||!form.fin||!form.personne.trim()||form.fin<form.debut)return;
    const vid=modal.vid, ex=prets[vid]||[];
    let up;
    if(modal.mode==="new"){
      up={...prets,[vid]:[...ex,{id:Date.now().toString(),...form,personne:form.personne.trim(),color:BAR_COLORS[ex.length%BAR_COLORS.length]}]};
    }else{
      up={...prets,[vid]:ex.map(p=>p.id===modal.pid?{...p,...form,personne:form.personne.trim()}:p)};
    }
    save(vhl,up,hidden);setModal(null);
  }
  function delPret(){save(vhl,{...prets,[modal.vid]:(prets[modal.vid]||[]).filter(p=>p.id!==modal.pid)},hidden);setModal(null);}
  function toggleHide(id){save(vhl,prets,{...hidden,[id]:!hidden[id]});}
  function addVhl(){
    if(!nim.trim())return;
    const id=nim.trim().toUpperCase();
    if(vhl.find(v=>v.id===id)){alert("Existe déjà.");return;}
    save([...vhl,{id,modele:nmo.trim()||"—",moteur:"",fin:"",couleur:"",event:"2A",parc:parcActif,vin:""}],prets,hidden);
    setNim("");setNmo("");setAddOpen(false);
  }
  function delVhl(id){
    if(!confirm("Supprimer définitivement le véhicule "+id+" ?\nCette action est irréversible."))return;
    const newPrets={...prets}; delete newPrets[id];
    const newHidden={...hidden}; delete newHidden[id];
    save(vhl.filter(v=>v.id!==id),newPrets,newHidden);
  }

  function getBar(pr){
    const ms=new Date(vy,vm,1), me=new Date(vy,vm,days.length);
    const ps=parseD(pr.debut), pe=parseD(pr.fin);
    if(!ps||!pe||pe<ms||ps>me)return null;
    const cs=ps<ms?ms:ps, ce=pe>me?me:pe;
    return{left:(cs.getDate()-1)*colW+1, width:Math.round((ce-cs)/86400000+1)*colW-3};
  }

  function genContrat(v){
    const vp=prets[v.id]||[];
    const pr=vp.find(p=>p.debut<=tISO&&p.fin>=tISO)||vp[vp.length-1];
    const parts=pr?pr.personne.split(" "):[];
    const prenomBen=(parts[0]||"").toUpperCase()||"__________";
    const nomBen=parts.slice(1).join(" ").toUpperCase()||"__________";
    function toFR(iso){if(!iso)return"__/__/__";const[y,m,d]=iso.split("-");return d+"/"+m+"/"+y.slice(2);}
    const dd=toFR(pr?pr.debut:"");
    const df=toFR(pr?pr.fin:"");
    const dateSign=toFR(tISO);

    // Numérotation par date/heure de génération
    const now=new Date();
    const pad=n=>String(n).padStart(2,"0");
    const numero=String(now.getFullYear())+pad(now.getMonth()+1)+pad(now.getDate())+"-"+pad(now.getHours())+pad(now.getMinutes());

    // Décoder le template DOCX
    const raw=atob(window.DOCX_TPL);
    const bytes=new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);

    JSZip.loadAsync(bytes).then(zip=>{
      zip.file("word/document.xml").async("string").then(xml=>{
        xml=xml.split("##IMMAT##").join(v.id);
        xml=xml.split("##MODELE##").join(v.modele||"");
        xml=xml.split("##VIN##").join(v.vin||"");
        xml=xml.split("##PRENOM##").join(prenomBen);
        xml=xml.split("##NOM##").join(nomBen);
        xml=xml.split("##DDEBUT##").join(dd);
        xml=xml.split("##DFIN##").join(df);
        xml=xml.split("##HEURE##").join("09H00");
        xml=xml.split("##DATESIGN##").join(dateSign);
        xml=xml.split("##NUMERO##").join(numero);
        zip.file("word/document.xml",xml);
        zip.generateAsync({type:"blob"}).then(blob=>{
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;a.download="Contrat_"+numero+"_"+v.id+".docx";
          document.body.appendChild(a);a.click();
          document.body.removeChild(a);URL.revokeObjectURL(url);
        });
      });
    }).catch(e=>alert("Erreur contrat: "+e.message));
  }
  const uParcs=useMemo(()=>["TOUS",...PARCS_LIST],[]);
  const uEvents=useMemo(()=>["TOUS",...[...new Set(vhl.map(v=>v.event).filter(Boolean))].sort()],[vhl]);
  const uModeles=useMemo(()=>["TOUS",...[...new Set(vhl.map(v=>v.modele).filter(Boolean))].sort()],[vhl]);
  const uMoteurs=useMemo(()=>["TOUS",...[...new Set(vhl.map(v=>v.moteur).filter(Boolean))].sort()],[vhl]);
  const uFins=useMemo(()=>["TOUS",...[...new Set(vhl.map(v=>v.fin).filter(Boolean))].sort()],[vhl]);
  const uCouleurs=useMemo(()=>["TOUS",...[...new Set(vhl.map(v=>v.couleur).filter(Boolean))].sort()],[vhl]);
  const [fMoteur,setFMoteur]=useState("TOUS");
  const hasFilter=fEvent!==""||fModele!=="TOUS"||fFin!=="TOUS"||fCouleur!=="TOUS"||fMoteur!=="TOUS"||srch!=="";
  function resetFilters(){setFEvent("");setFModele("TOUS");setFFin("TOUS");setFCouleur("TOUS");setFMoteur("TOUS");setSrch("");}

  const sq=srch.toLowerCase();
  const visible=vhl.filter(v=>{
    if(v.parc!==parcActif)return false;
    if(hidden[v.id])return false;
    if(fEvent&&!(v.event||"").toLowerCase().includes(fEvent.toLowerCase()))return false;

                  </th>

          <tbody>
            {visible.map((v,ri)=>{
              const vp=prets[v.id]||[];

{!compactMode&&<>

          {importResult.error
            ? <span style={{color:"#dc2626",fontWeight:700,fontSize:12}}>❌ {importResult.error}</span>
            : <span style={{color:"#166534",fontWeight:700,fontSize:12}}>✅ Import terminé — {importResult.added} ajouté(s), {importResult.skipped} ignoré(s) (déjà présents)</span>
          }
        </div>
      )}

      {/* MODAL ARCHIVE */}
      {showArchive&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>setShowArchive(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:24,width:"90%",maxWidth:700,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 30px 80px rgba(0,0,0,0.25)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:800,color:"#0c1a2e"}}>🗃️ Véhicules archivés ({archived.length})</div>
              <button onClick={()=>setShowArchive(false)} style={{background:"#f3f4f6",border:"none",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
            {archived.length===0
              ? <div style={{textAlign:"center",color:"#9ca3af",padding:40,fontSize:13}}>Aucun véhicule archivé</div>
              : <div style={{overflow:"auto",flex:1}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr>{["Immat","Modèle","Moteur","Couleur","Parc","VIN","Archivé le"].map(h=>(
                        <th key={h} style={{padding:"6px 8px",background:"#f8fafc",fontWeight:700,color:"#6b7280",textAlign:"left",borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {archived.map((v,i)=>(
                        <tr key={i} style={{background:i%2===0?"#fff":"#f9fafb"}}>
                          <td style={{padding:"6px 8px",fontWeight:700,color:"#0c1a2e",borderBottom:"1px solid #f1f5f9"}}>{v.id}</td>
                          <td style={{padding:"6px 8px",color:"#1e40af",borderBottom:"1px solid #f1f5f9"}}>{v.modele}</td>
                          <td style={{padding:"6px 8px",color:"#047857",borderBottom:"1px solid #f1f5f9"}}>{v.moteur}</td>
                          <td style={{padding:"6px 8px",borderBottom:"1px solid #f1f5f9"}}>{v.couleur}</td>
                          <td style={{padding:"6px 8px",borderBottom:"1px solid #f1f5f9"}}>{v.parc}</td>
                          <td style={{padding:"6px 8px",fontFamily:"monospace",fontSize:9,color:"#6b7280",borderBottom:"1px solid #f1f5f9"}}>{v.vin}</td>
                          <td style={{padding:"6px 8px",color:"#9ca3af",borderBottom:"1px solid #f1f5f9"}}>{v.archivedAt}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
            }
          </div>
        </div>
      )}

      {/* MODAL MOUVEMENTS */}
      {showMouvements&&(()=>{
        const rows=[];
        Object.entries(prets).forEach(([vid,vp])=>{
          const v=vhl.find(x=>x.id===vid);
          (vp||[]).forEach(pr=>{
            rows.push({...pr,vid,modele:v?v.modele:"",parc:v?v.parc:""});
          });
        });
        rows.sort((a,b)=>b.debut.localeCompare(a.debut));
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>setShowMouvements(false)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:24,width:"95%",maxWidth:1100,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 30px 80px rgba(0,0,0,0.25)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:800,color:"#0c1a2e"}}>📋 Historique des mouvements ({rows.length})</div>
                <button onClick={()=>setShowMouvements(false)} style={{background:"#f3f4f6",border:"none",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:14}}>✕</button>
              </div>
              {rows.length===0
                ? <div style={{textAlign:"center",color:"#9ca3af",padding:40,fontSize:13}}>Aucun mouvement enregistré</div>
                : <div style={{overflow:"auto",flex:1}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:10.5}}>
                      <thead>
                        <tr>{["Immat","Modèle","Parc","Personne","Départ","H.Départ","Site D.","Km D.","Retour","H.Retour","Site R.","Km R.","Statut","⚠️ Dégâts"].map(h=>(
                          <th key={h} style={{padding:"6px 7px",background:"#f8fafc",fontWeight:700,color:"#6b7280",textAlign:"left",borderBottom:"2px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
                        ))}</tr>
                      </thead>
                      <tbody>
                        {rows.map((r,i)=>(
                          <tr key={i} style={{background:i%2===0?"#fff":"#f9fafb"}}>
                            <td style={{padding:"5px 7px",fontWeight:700,color:"#0c1a2e",borderBottom:"1px solid #f1f5f9",whiteSpace:"nowrap"}}>{r.vid}</td>
                            <td style={{padding:"5px 7px",color:"#1e40af",borderBottom:"1px solid #f1f5f9"}}>{r.modele}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>{r.parc}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>{r.personne}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9",whiteSpace:"nowrap"}}>{r.debut.split("-").reverse().join("/")}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>{r.heureDepart||"—"}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>{r.siteDepart||"—"}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9",textAlign:"right"}}>{r.kmDepart||"—"}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9",whiteSpace:"nowrap"}}>{r.fin.split("-").reverse().join("/")}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>{r.heureRetour||"—"}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>{r.siteRetour||"—"}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9",textAlign:"right"}}>{r.kmRetour||"—"}</td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9"}}>
                              {r.retourConfirme?<span style={{color:"#16a34a",fontWeight:700}}>✅ Rentré</span>
                                :r.departConfirme?<span style={{color:"#d97706",fontWeight:700}}>🚗 En cours</span>
                                :<span style={{color:"#9ca3af"}}>⏳ Prévu</span>}
                            </td>
                            <td style={{padding:"5px 7px",borderBottom:"1px solid #f1f5f9",maxWidth:220}}>
                              {(r.commentaireDepart||r.commentaireRetour)
                                ? <span style={{background:"#fee2e2",color:"#991b1b",borderRadius:5,padding:"2px 6px",fontWeight:700,display:"inline-block"}}>
                                    ⚠️ {[r.commentaireDepart&&"D: "+r.commentaireDepart, r.commentaireRetour&&"R: "+r.commentaireRetour].filter(Boolean).join(" · ")}
                                  </span>
                                : <span style={{color:"#d1d5db"}}>—</span>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
              }
            </div>
          </div>
        );
      })()}

      {/* MODAL PRÊT */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:24,width:340,boxShadow:"0 30px 80px rgba(0,0,0,0.25)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#0c1a2e"}}>{modal.mode==="new"?"➕ Nouveau prêt":"✏️ Modifier le prêt"}</div>
                <div style={{fontSize:11,color:"#6b7280",marginTop:1}}>{modal.vid} · {(()=>{const v=vhl.find(x=>x.id===modal.vid);return v?v.modele+" · "+v.couleur:"";})()}</div>
              </div>
              <button onClick={()=>setModal(null)} style={{background:"#f3f4f6",border:"none",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
            <div style={{display:"grid",gap:12}}>
              <div><label style={lbl}>📅 Date de départ</label><input type="date" value={form.debut} onChange={e=>setForm(f=>({...f,debut:e.target.value}))} style={inp}/></div>
              <div><label style={lbl}>📅 Date de retour</label><input type="date" value={form.fin} min={form.debut} onChange={e=>setForm(f=>({...f,fin:e.target.value}))} style={inp}/></div>
              <div><label style={lbl}>👤 Personne / Structure</label><input type="text" value={form.personne} onChange={e=>setForm(f=>({...f,personne:e.target.value}))} placeholder="Nom, partenaire…" style={inp} onKeyDown={e=>e.key==="Enter"&&savePret()}/></div>
              <div style={{borderTop:"1px dashed #e5e7eb",paddingTop:10,marginTop:2}}>
                <div style={{fontSize:11,fontWeight:800,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>🚗 Suivi du mouvement (optionnel)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div><label style={{...lbl,fontSize:10}}>Heure départ</label><input type="time" value={form.heureDepart} onChange={e=>setForm(f=>({...f,heureDepart:e.target.value}))} style={inp}/></div>
                  <div><label style={{...lbl,fontSize:10}}>Heure retour</label><input type="time" value={form.heureRetour} onChange={e=>setForm(f=>({...f,heureRetour:e.target.value}))} style={inp}/></div>
                  <div><label style={{...lbl,fontSize:10}}>Km départ</label><input type="number" value={form.kmDepart} onChange={e=>setForm(f=>({...f,kmDepart:e.target.value}))} placeholder="ex: 10000" style={inp}/></div>
                  <div><label style={{...lbl,fontSize:10}}>Km retour</label><input type="number" value={form.kmRetour} onChange={e=>setForm(f=>({...f,kmRetour:e.target.value}))} placeholder="ex: 10250" style={inp}/></div>
                  <div><label style={{...lbl,fontSize:10}}>Site départ</label><input type="text" value={form.siteDepart} onChange={e=>setForm(f=>({...f,siteDepart:e.target.value}))} placeholder="ex: A10" style={inp}/></div>
                  <div><label style={{...lbl,fontSize:10}}>Site retour</label><input type="text" value={form.siteRetour} onChange={e=>setForm(f=>({...f,siteRetour:e.target.value}))} placeholder="ex: D51" style={inp}/></div>
                </div>
              </div>
            </div>
            {ok&&<div style={{marginTop:8,background:"#f0fdf4",borderRadius:7,padding:"6px 10px",fontSize:11,color:"#16a34a",fontWeight:600}}>✓ {Math.round((parseD(form.fin)-parseD(form.debut))/86400000)+1} jour(s)</div>}
            {form.fin&&form.fin<form.debut&&<div style={{marginTop:8,background:"#fef2f2",borderRadius:7,padding:"6px 10px",fontSize:11,color:"#dc2626",fontWeight:600}}>⚠️ Date retour avant date départ</div>}
            <div style={{display:"flex",gap:6,marginTop:14}}>
              {modal.mode==="edit"&&(
                <button onClick={()=>{if(confirm("Cette réservation n'a pas été honorée et va être définitivement supprimée.\n\nConfirmer la suppression ?"))delPret();}}
                  style={{padding:"9px 11px",borderRadius:8,border:"none",background:"#fef2f2",color:"#dc2626",cursor:"pointer",fontSize:11,fontWeight:700}}>
                  🗑️ Non honorée
                </button>
              )}
              {modal.mode==="edit"&&!((prets[modal.vid]||[]).find(p=>p.id===modal.pid)?.retourConfirme)&&(
                <button onClick={()=>{confirmAction(modal.vid,modal.pid,"retour");setModal(null);}}
                  style={{padding:"9px 11px",borderRadius:8,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700}}>
                  ✅ Retour confirmé
                </button>
              )}
              {modal.mode==="edit"&&((prets[modal.vid]||[]).find(p=>p.id===modal.pid)?.retourConfirme)&&(
                <button onClick={()=>{confirmAction(modal.vid,modal.pid,"annuler_retour");setModal(null);}}
                  style={{padding:"9px 11px",borderRadius:8,border:"none",background:"#fee2e2",color:"#991b1b",cursor:"pointer",fontSize:11,fontWeight:700}}>
                  ↩️ Annuler retour confirmé
                </button>
              )}
              <button onClick={()=>setModal(null)} style={{flex:1,padding:"9px",borderRadius:8,border:"1.5px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>Annuler</button>
              <button onClick={savePret} disabled={!ok} style={{flex:2,padding:"9px",borderRadius:8,border:"none",background:ok?"#0c1a2e":"#e5e7eb",color:ok?"#fff":"#9ca3af",cursor:ok?"pointer":"not-allowed",fontSize:12,fontWeight:700}}>Enregistrer</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL AJOUTER */}
      {addOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>setAddOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:24,width:320,boxShadow:"0 30px 80px rgba(0,0,0,0.25)"}}>
            <div style={{fontSize:14,fontWeight:800,marginBottom:4,color:"#0c1a2e"}}>➕ Ajouter un véhicule</div>
            <div style={{fontSize:11,color:"#2563eb",fontWeight:700,marginBottom:16,background:"#eff6ff",borderRadius:6,padding:"4px 8px",display:"inline-block"}}>→ Parc {parcActif}</div>
            <div style={{display:"grid",gap:10}}>
              <div><label style={lbl}>Immatriculation *</label><input value={nim} onChange={e=>setNim(e.target.value.toUpperCase())} placeholder="XX-000-XX" style={inp}/></div>
              <div><label style={lbl}>Modèle</label><input value={nmo} onChange={e=>setNmo(e.target.value)} placeholder="C5 AC, C3 AIR…" style={inp}/></div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:16}}>
              <button onClick={()=>setAddOpen(false)} style={{flex:1,padding:"9px",borderRadius:8,border:"1.5px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>Annuler</button>
              <button onClick={addVhl} disabled={!nim.trim()} style={{flex:2,padding:"9px",borderRadius:8,border:"none",background:nim.trim()?"#0c1a2e":"#e5e7eb",color:nim.trim()?"#fff":"#9ca3af",cursor:"pointer",fontSize:12,fontWeight:700}}>Ajouter</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
